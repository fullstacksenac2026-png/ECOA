# render.yaml - configuration for Render.com deployment

services:
  - type: web
    name: django-web
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "hypercorn projeto_integrador.asgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SECRET_KEY
        value: "replace-with-secure-value"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "your-app.onrender.com"
      # If using a managed database, set DATABASE_URL accordingly:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: your-database-name
