{% extends "app-base.html" %}

{% block title %}Editar Postagem{% endblock %}

{% block content %}
<main class="container">
    <section class="py-4">
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'forum:forum-post-detail' post.id %}" class="btn btn-outline-secondary rounded-circle me-3" style="width: 40px; height: 40px; padding: 0.5rem 0.2rem;">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h1 class="h3 mb-0">Editar Postagem</h1>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">Título</label>
                        <input type="text" name="title" id="title" class="form-control rounded-3 py-2" value="{{ post.title }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="content" class="form-label fw-bold">Conteúdo</label>
                        <textarea name="content" id="content" rows="6" class="form-control rounded-3" required>{{ post.content }}</textarea>
                    </div>

                    <div class="mb-4">
                        <label for="image" class="form-label fw-bold">Alterar Imagem (Opcional)</label>
                        {% if post.image %}
                        <div class="mb-2">
                            <img src="{{ post.image.url }}" alt="Atual" class="img-thumbnail" style="max-height: 150px;">
                        </div>
                        {% endif %}
                        <input type="file" name="image" id="image" class="form-control rounded-3" accept="image/*">
                    </div>

                    <div class="d-flex gap-2">
                        <a href="{% url 'forum:forum-post-detail' post.id %}" class="btn btn-outline-secondary btn-lg flex-grow-1 rounded-pill fw-bold py-3">Cancelar</a>
                        <button type="submit" class="btn btn-primary btn-lg flex-grow-1 rounded-pill fw-bold py-3" style="background-color: #20c997; border: none;">
                            <i class="bi bi-save me-2"></i> Salvar Alterações
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</main>
{% endblock %}
